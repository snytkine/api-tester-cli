---
name: "Test Suite with Elvis Operator Defaults"
description: "Test suite description."
variables:
  api_base_url: "[[${cli.api_base_url != null ? cli.api_base_url : 'https://localhost:8080'}]]"
  environment: "[[${cli.environment != null ? cli.environment : 'staging'}]]"
  timeout: "[[${cli.timeout != null ? cli.timeout : '30'}]]"
tests:
- name: "Test Health Check"
  description: "Verify service health endpoint."
  request:
    method: "GET"
    url: "[[${suite.api_base_url}]]/health"
    headers:
      x-environment: "[[${suite.environment}]]"
  assertions:
  - type: "status_code"
    expected: 200
