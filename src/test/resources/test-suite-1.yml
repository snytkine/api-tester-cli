---
name: "Test Suite for My Application v1.0"
description: "Integration test suite used to verify HTTP request execution against\
  \ a live endpoint."
variables:
  api_base_url: "https://api.restful-api.dev"
tests:
- name: "Objects Test"
  request:
    method: "GET"
    url: "[[${suite.api_base_url}]]/objects"
    headers:
      Accept: "application/json"
  assertions:
  - type: "status_code"
    expected: 200
