---
name: "Test Suite for My Application v1.0"
description: "This test suite covers the basic functionality of My Application version\
  \ 1.0."
variables:
  api_base_url: "https://api.restful-api.dev"
  request_id: "[[${#strings.randomAlphanumeric(12)}]]"
tests:
- name: "Objects Test"
  request:
    method: "GET"
    url: "[[${suite.variables.api_base_url}]]/objects"
    headers:
      Accept: "application/json"
  assertions:
  - type: "status_code"
    expected: 200
  - type: "json_schema"
    path: "response.body.json"
    expected:
      type: "file"
      content: "schemas/objects_schema.json"
  - type: "json_path"
    path: "response.headers.content-type"
    expected: "application/json"
  - type: "json_match"
    path: "response.body.json"
    expected:
      type: "file"
      content: "expected_login_response.json"
      ignore:
      - "timestamp"
      - "session_id"
