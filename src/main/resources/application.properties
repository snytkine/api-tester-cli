spring.main.banner-mode=off
logging.level.root=OFF
logging.level.io.github.snytkine.apitester=OFF
spring.application.name=api-tester-cli
# Disable Spring Shell's built-in `version` command so it does not clash with the
# application's own VersionCommand. The built-in registers a bean named `versionCommand`
# (StandardCommandsAutoConfiguration) under the same name our @Component resolves to,
# which fails context startup with overriding disabled. This property is read at AOT
# build time, so the built-in command is also excluded from the GraalVM native image.
spring.shell.command.version.enabled=false

# Background check, on startup, for a newer published GitHub release than the one currently
# running. Runs on a daemon thread and never blocks startup or a suite run; set enabled=false
# to disable entirely (e.g. offline environments, CI, tests).
apitester.version-check.enabled=true
apitester.version-check.url=https://api.github.com/repos/snytkine/api-tester-cli/releases/latest
apitester.version-check.upgrade-page-url=https://github.com/snytkine/api-tester-cli/releases/latest
apitester.version-check.timeout-seconds=10
apitester.version-check.max-retries=3
apitester.version-check.retry-interval-seconds=5
apitester.version-check.upgrade-message=Version {latestVersion} is available.